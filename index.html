<!--
  Cross-Zone Meeting Coordinator  (GitHub-native poll edition)
  ------------------------------------------------------------------
  Purpose: find the least-cruel common meeting time across timezones,
  and collect votes from invitees via per-person tokenized invite links.

  ARCHITECTURE (see INTEGRATION CONTRACT):
  - One PUBLIC GitHub repo. 'main' = this app (served by Pages as index.html).
    Orphan branch 'poll-data' = committed poll/vote JSON.
  - WRITE: the browser commits DIRECTLY to the poll-data branch via the GitHub
    Contents API (PUT poll.json / votes.json, ~1-2s). The old repository_dispatch
    + ingest-Action write path is RETIRED (the Action is disabled separately).
  - READ: the browser GETs the same files via the authenticated Contents API so
    reads are always fresh (raw.githubusercontent is CDN-cached and can lag).
  - All persistence is behind the Store adapter (one swap point). It ALWAYS
    uses localStorage (cache + local-only source of truth) and, when
    sharedMode, also commits/reads directly to/from GitHub.
  - If GH.dispatchToken is still the placeholder or empty => LOCAL-ONLY mode:
    the app fully works locally, shows a notice, makes no network calls.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- responder pages must not leak the ?t= token via Referer -->
<meta name="referrer" content="no-referrer" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<!-- speed up first paint: warm the data host + load all ES modules in parallel
     instead of the default sequential import waterfall -->
<link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />
<link rel="modulepreload" href="js/main.js" />
<link rel="modulepreload" href="js/state.js" />
<link rel="modulepreload" href="js/utils.js" />
<link rel="modulepreload" href="js/tz-engine.js" />
<link rel="modulepreload" href="js/github-store.js" />
<link rel="modulepreload" href="js/ui-components.js" />
<link rel="modulepreload" href="js/ui-results.js" />
<link rel="modulepreload" href="js/responder.js" />

  <link rel="stylesheet" href="css/style.css">

<main class="wrap" id="root">
  <div class="loading">Loading…</div>
</main>

<script>
"use strict";

window.onerror = function(msg, url, lineNo, columnNo, error) {
  var root = document.getElementById("root");
  if(root) {
    root.innerHTML = "<div style='color:red; padding:20px; font-family:monospace;'>" +
      "<h3>Error loading app</h3>" +
      "<p>" + msg + "</p>" +
      "<p>File: " + url + " line " + lineNo + "</p>" +
      "<pre>" + (error && error.stack ? error.stack : "") + "</pre>" +
      "</div>";
  }
  return false;
};

window.addEventListener("unhandledrejection", function(event) {
  var root = document.getElementById("root");
  if(root) {
    root.innerHTML = "<div style='color:red; padding:20px; font-family:monospace;'>" +
      "<h3>Async Error loading app</h3>" +
      "<p>" + (event.reason && event.reason.message || event.reason) + "</p>" +
      "<pre>" + (event.reason && event.reason.stack ? event.reason.stack : "") + "</pre>" +
      "</div>";
  }
});

/* ====================================================================
   0. GITHUB CONFIG BLOCK
   --------------------------------------------------------------------
   Deploy (GitHub Actions) injects the dispatch token from a secret in
   place of __POLL_DISPATCH_TOKEN__. owner/repo are replaced at deploy or
   hand-edited. If dispatchToken still equals the placeholder or is empty,
   the app runs LOCAL-ONLY (no network; localStorage is the source of
   truth). Otherwise sharedMode is on: writes and reads go DIRECTLY through
   the GitHub Contents API (commit poll.json / votes.json on the poll-data
   branch). The token is still named dispatchToken for config compatibility,
   but it now authenticates Contents-API commits, not repository_dispatch.
   ==================================================================== */
window.GH = {
  owner: "adityachaturvedii",       // baked in; deploy re-injects the same value
  repo: "convene",
  dataBranch: "poll-data",
  dispatchToken: "__POLL_DISPATCH_TOKEN__"  // injected from Actions secret at deploy; if it still
                                            // equals this placeholder or is empty => LOCAL-ONLY mode
};
  </script>
  <script type="module" src="js/main.js"></script>
